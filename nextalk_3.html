<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexTalk</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0C0B12;--surface:#13111E;--surface2:#1A1826;--border:rgba(255,255,255,0.07);
  --accent:#7C6FFF;--accent2:#FF6B9D;--text:#EAE8F5;--muted:#6B6886;
  --green:#4ECDC4;--red:#FF6B6B;--yellow:#FFE66D;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;}

/* ═══ AUTH ═══ */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse at 30% 20%,rgba(124,111,255,0.15) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(255,107,157,0.1) 0%,transparent 60%),var(--bg);}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 36px;width:380px;box-shadow:0 32px 80px rgba(0,0,0,0.5);}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:22px;}
.auth-logo h1{font-size:22px;font-weight:700;}.auth-logo p{font-size:12px;color:var(--muted);}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px;margin-bottom:24px;}
.tab-btn{flex:1;padding:8px;border:none;border-radius:8px;background:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.tab-active{background:var(--accent)!important;color:white!important;}
.form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.form-group input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
.form-group input:focus{border-color:var(--accent);}
.form-group input::placeholder{color:var(--muted);}
#auth-error{color:var(--red);font-size:12px;margin-bottom:12px;min-height:16px;}
.auth-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#5A52D5);color:white;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}

/* ═══ LAYOUT ═══ */
#app{display:none;height:100vh;}
.layout{display:flex;height:100vh;overflow:hidden;}

/* ═══ SIDEBAR ═══ */
#sidebar{width:270px;min-width:270px;background:#09080F;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:all .3s;}
.sidebar-hidden{width:0!important;min-width:0!important;}
.sidebar-header{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.brand-name{font-weight:700;font-size:16px;}

/* Nav */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);}
.nav-tab{flex:1;padding:9px 0;background:none;border:none;color:var(--muted);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.sidebar-panel{flex:1;overflow-y:auto;padding:8px;display:none;}
.sidebar-panel.active{display:block;}
.section-label{font-size:10px;font-weight:700;color:#3D3A55;letter-spacing:1.5px;text-transform:uppercase;padding:8px 6px 5px;display:flex;align-items:center;justify-content:space-between;}
.section-add{background:none;border:none;color:var(--accent);cursor:pointer;font-size:16px;padding:2px;}

/* Items */
.item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:background .15s;}
.item:hover{background:rgba(255,255,255,0.04);}
.item-active{background:rgba(124,111,255,0.15)!important;}
.item-icon{font-size:16px;flex-shrink:0;}
.item-label{font-size:13px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-active .item-label{color:var(--text);font-weight:600;}
.item-badge{background:var(--accent2);color:white;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;}

/* Contact item */
.contact-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:background .15s;}
.contact-item:hover{background:rgba(255,255,255,0.04);}
.contact-item:hover .call-btns{opacity:1;}
.call-btns{display:flex;gap:3px;opacity:0;transition:opacity .15s;}
.call-btn{background:rgba(255,255,255,0.06);border:none;border-radius:7px;width:26px;height:26px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.call-btn:hover{background:rgba(124,111,255,0.3);}
.c-info{flex:1;min-width:0;}
.c-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-status{font-size:11px;color:var(--green);}

.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0C0B12;flex-shrink:0;position:relative;}
.status-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;border:2px solid #09080F;background:var(--green);}
#user-name-footer{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#signout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;}

/* ═══ MODAL ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:340px;box-shadow:0 32px 80px rgba(0,0,0,0.5);}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;margin-bottom:10px;}
.modal input:focus{border-color:var(--accent);}
.modal input::placeholder{color:var(--muted);}
.modal-members{max-height:160px;overflow-y:auto;margin-bottom:10px;}
.modal-member{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .15s;}
.modal-member:hover{background:rgba(255,255,255,0.04);}
.modal-member input[type=checkbox]{accent-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.modal-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.modal-btn-cancel{background:rgba(255,255,255,0.06);color:var(--text);}
.modal-btn-ok{background:linear-gradient(135deg,var(--accent),#5A52D5);color:white;}

/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;background:rgba(9,8,15,0.8);backdrop-filter:blur(10px);flex-shrink:0;}
#menu-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
#channel-name{font-weight:700;font-size:15px;flex:1;}
.topbar-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:5px 11px;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.topbar-btn:hover{background:rgba(124,111,255,0.2);}
#topbar-actions{display:none;gap:6px;}

/* Messages */
#messages-wrap{flex:1;overflow-y:auto;}
#messages{padding:14px 18px 8px;display:flex;flex-direction:column;}
.loading{color:var(--muted);font-size:13px;text-align:center;padding:40px;}
.msg-wrap{display:flex;align-items:flex-end;gap:8px;}
.msg-wrap.me{flex-direction:row-reverse;}
.msg-col{display:flex;flex-direction:column;max-width:65%;}
.msg-meta{font-size:11px;color:var(--muted);margin-bottom:3px;padding:0 4px;}
.bubble{padding:9px 13px;font-size:14px;line-height:1.55;word-break:break-word;}
.bubble-me{background:linear-gradient(135deg,#5A52D5,#7C6FFF);border-radius:16px 4px 16px 16px;}
.bubble-other{background:rgba(255,255,255,0.06);border-radius:4px 16px 16px 16px;}

/* Input */
.input-bar{padding:8px 16px 12px;border-top:1px solid var(--border);flex-shrink:0;}
.input-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;padding:5px 5px 5px 14px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(124,111,255,0.4);}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;}
#msg-input::placeholder{color:var(--muted);}
#send-btn{background:linear-gradient(135deg,var(--accent),#5A52D5);border:none;border-radius:10px;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.input-hint{text-align:center;font-size:10px;color:#2A2840;margin-top:6px;}

/* ═══ CALL UI ═══ */
#call-overlay{display:none;position:fixed;inset:0;background:rgba(10,9,16,0.97);z-index:1000;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.call-avatar-big{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#0C0B12;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 8px rgba(124,111,255,0.15);}50%{box-shadow:0 0 0 18px rgba(124,111,255,0.04);}}
.call-name{font-size:22px;font-weight:700;}.call-status{font-size:13px;color:var(--muted);}
.call-controls{display:flex;gap:14px;margin-top:12px;}
.call-ctrl{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.call-ctrl:hover{transform:scale(1.1);}
.btn-end{background:var(--red);}.btn-mute{background:rgba(255,255,255,0.1);}.btn-cam{background:rgba(255,255,255,0.1);}
#remote-video{width:100%;max-width:580px;border-radius:16px;background:#1a1826;display:none;}
#local-video{position:fixed;bottom:110px;right:16px;width:110px;border-radius:12px;background:#1a1826;display:none;z-index:1001;}

#incoming-call{display:none;position:fixed;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px 18px;z-index:2000;box-shadow:0 16px 48px rgba(0,0,0,0.5);animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.incoming-title{font-size:11px;color:var(--muted);margin-bottom:3px;}
.incoming-name{font-size:15px;font-weight:700;margin-bottom:10px;}
.incoming-btns{display:flex;gap:8px;}
.btn-accept{flex:1;padding:8px;border:none;border-radius:9px;background:var(--green);color:#0C0B12;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
.btn-decline{flex:1;padding:8px;border:none;border-radius:9px;background:var(--red);color:white;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(124,111,255,0.2);border-radius:2px;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <div><h1>NexTalk</h1><p>Messagerie, Groupes & Appels</p></div>
    </div>
    <div class="tabs">
      <button class="tab-btn tab-active" data-tab="login">Se connecter</button>
      <button class="tab-btn" data-tab="register">Créer un compte</button>
    </div>
    <div id="name-group" class="form-group" style="display:none">
      <label>Votre prénom</label>
      <input id="auth-name" type="text" placeholder="Ex : Sophie"/>
    </div>
    <div class="form-group"><label>Email</label><input id="auth-email" type="email" placeholder="vous@email.com"/></div>
    <div class="form-group"><label>Mot de passe</label><input id="auth-pass" type="password" placeholder="••••••••"/></div>
    <p id="auth-error"></p>
    <button id="auth-submit" class="auth-btn">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="brand-icon">💬</div>
        <div class="brand-name">NexTalk</div>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-panel="salons">Salons</button>
        <button class="nav-tab" data-panel="groupes">Groupes</button>
        <button class="nav-tab" data-panel="contacts">Contacts</button>
      </div>

      <!-- SALONS -->
      <div class="sidebar-panel active" id="panel-salons">
        <div class="section-label">Salons publics</div>
        <div id="channel-list"></div>
      </div>

      <!-- GROUPES -->
      <div class="sidebar-panel" id="panel-groupes">
        <div class="section-label">
          Mes groupes
          <button class="section-add" id="create-group-btn" title="Créer un groupe">＋</button>
        </div>
        <div id="groups-list"><div class="loading" style="padding:16px;font-size:12px">Aucun groupe</div></div>
      </div>

      <!-- CONTACTS / MP -->
      <div class="sidebar-panel" id="panel-contacts">
        <div style="padding:8px;background:rgba(255,255,255,0.03);border-radius:10px;margin-bottom:8px;">
          <input id="contact-email-input" type="email" placeholder="Email du contact…"
            style="width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;margin-bottom:6px;"/>
          <button id="add-contact-btn"
            style="width:100%;padding:6px;border:none;border-radius:8px;background:var(--accent);color:white;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;">+ Ajouter</button>
        </div>
        <div class="section-label">Messages privés</div>
        <div id="contacts-list"><div class="loading" style="padding:16px;font-size:12px">Ajoutez un contact</div></div>
      </div>

      <div class="sidebar-footer">
        <div class="avatar" id="user-initials-footer" style="background:#7C6FFF">?<div class="status-dot"></div></div>
        <span id="user-name-footer">...</span>
        <button id="signout-btn">🚪</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <button id="menu-btn">☰</button>
        <div id="channel-name"># général</div>
        <div id="topbar-actions">
          <button class="topbar-btn" id="audio-call-btn">📞 Audio</button>
          <button class="topbar-btn" id="video-call-btn">📹 Vidéo</button>
        </div>
      </div>
      <div id="messages-wrap"><div id="messages"><div class="loading">Chargement…</div></div></div>
      <div class="input-bar">
        <div class="input-wrap">
          <input id="msg-input" type="text" placeholder="Écrire un message…"/>
          <button id="send-btn">➤</button>
        </div>
        <div class="input-hint">Entrée pour envoyer</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CRÉER GROUPE -->
<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <h3>👥 Créer un groupe</h3>
    <input id="group-name-input" type="text" placeholder="Nom du groupe (ex: Famille 👨‍👩‍👧)"/>
    <div class="section-label" style="margin-bottom:6px;">Ajouter des membres</div>
    <div class="modal-members" id="modal-members-list"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" id="group-modal-cancel">Annuler</button>
      <button class="modal-btn modal-btn-ok" id="group-modal-ok">Créer</button>
    </div>
  </div>
</div>

<!-- CALL -->
<div id="call-overlay">
  <video id="remote-video" autoplay playsinline></video>
  <video id="local-video" autoplay playsinline muted></video>
  <div class="call-avatar-big" id="call-avatar">?</div>
  <div class="call-name" id="call-contact-name">Appel</div>
  <div class="call-status" id="call-status">Connexion…</div>
  <div class="call-controls">
    <button class="call-ctrl btn-mute" id="mute-btn">🎤</button>
    <button class="call-ctrl btn-end" id="end-call-btn">📵</button>
    <button class="call-ctrl btn-cam" id="cam-btn" style="display:none">📷</button>
  </div>
</div>

<div id="incoming-call">
  <div class="incoming-title">📞 Appel entrant…</div>
  <div class="incoming-name" id="incoming-name">Quelqu'un</div>
  <div class="incoming-btns">
    <button class="btn-accept" id="accept-call-btn">✅ Répondre</button>
    <button class="btn-decline" id="decline-call-btn">❌ Refuser</button>
  </div>
</div>

<script>
const SUPABASE_URL="https://niogpehtgxqflpdluzbo.supabase.co";
const SUPABASE_KEY="sb_publishable_PW38JOVuiXptFu1zfuDR1A_2TItovQo";
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

const CHANNELS=[
  {id:"general",label:"général",icon:"💬"},
  {id:"design",label:"design",icon:"🎨"},
  {id:"dev",label:"développement",icon:"💻"},
  {id:"random",label:"aléatoire",icon:"🎲"},
];

// State
let currentUser=null,currentMode=null,currentTarget=null;
// mode: "channel" | "group" | "dm"
let realtimeSub=null,sigSub=null;
let contacts=[],groups=[];
let peerConn=null,localStream=null,isVideoCall=false,isMuted=false,incomingOffer=null;

const $=id=>document.getElementById(id);
const ini=n=>(n||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const clr=n=>{const c=["#FF6B6B","#4ECDC4","#FFE66D","#6C63FF","#FF8B94","#45AAF2","#F7B731","#A8E6CF"];let h=0;for(const x of(n||""))h=(h*31+x.charCodeAt(0))%c.length;return c[h];};
const fmtTime=ts=>new Date(ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const esc=t=>(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// ══ STORAGE ══
function saveLocal(){
  if(!currentUser)return;
  localStorage.setItem("nt_c_"+currentUser.id,JSON.stringify(contacts));
  localStorage.setItem("nt_g_"+currentUser.id,JSON.stringify(groups));
}
function loadLocal(){
  contacts=JSON.parse(localStorage.getItem("nt_c_"+(currentUser?.id||""))||"[]");
  groups=JSON.parse(localStorage.getItem("nt_g_"+(currentUser?.id||""))||"[]");
}

// ══ BUILD SIDEBAR ══
function buildAll(){buildChannels();buildGroups();buildContacts();}

function buildChannels(){
  const list=$("channel-list");list.innerHTML="";
  CHANNELS.forEach(ch=>{
    const el=document.createElement("div");
    el.className="item"+(currentMode==="channel"&&currentTarget===ch.id?" item-active":"");
    el.innerHTML=`<span class="item-icon">${ch.icon}</span><span class="item-label">#${ch.label}</span>`;
    el.onclick=()=>openChannel(ch.id,ch.label);
    list.appendChild(el);
  });
}

function buildGroups(){
  const list=$("groups-list");list.innerHTML="";
  if(!groups.length){list.innerHTML=`<div class="loading" style="padding:14px;font-size:12px">Créez votre premier groupe !</div>`;return;}
  groups.forEach(g=>{
    const el=document.createElement("div");
    el.className="item"+(currentMode==="group"&&currentTarget===g.id?" item-active":"");
    el.innerHTML=`<span class="item-icon">👥</span><span class="item-label">${esc(g.name)}</span><span style="font-size:10px;color:var(--muted)">${g.members?.length||0}</span>`;
    el.onclick=()=>openGroup(g);
    list.appendChild(el);
  });
}

function buildContacts(){
  const list=$("contacts-list");list.innerHTML="";
  if(!contacts.length){list.innerHTML=`<div class="loading" style="padding:14px;font-size:12px">Ajoutez un contact via son email</div>`;return;}
  contacts.forEach(c=>{
    const isActive=currentMode==="dm"&&currentTarget===c.email;
    const el=document.createElement("div");
    el.className="contact-item"+(isActive?" item-active":"");
    el.innerHTML=`
      <div class="avatar" style="background:${clr(c.name||c.email)};color:#0C0B12;width:30px;height:30px;font-size:10px">${ini(c.name||c.email)}</div>
      <div class="c-info"><div class="c-name">${esc(c.name||c.email)}</div><div class="c-status">● En ligne</div></div>
      <div class="call-btns">
        <button class="call-btn" data-type="audio" title="Appel audio">📞</button>
        <button class="call-btn" data-type="video" title="Appel vidéo">📹</button>
      </div>`;
    el.querySelector(".c-info").onclick=()=>openDM(c);
    el.querySelectorAll(".call-btn").forEach(btn=>btn.onclick=e=>{e.stopPropagation();startCall(c,btn.dataset.type==="video");});
    list.appendChild(el);
  });
}

// ══ OPEN CONVERSATIONS ══
function openChannel(id,label){
  currentMode="channel";currentTarget=id;
  $("channel-name").textContent="# "+label;
  $("topbar-actions").style.display="none";
  buildAll();loadMessages();subscribeMessages();
}

function openGroup(g){
  currentMode="group";currentTarget=g.id;
  $("channel-name").textContent="👥 "+g.name;
  $("topbar-actions").style.display="none";
  buildAll();loadGroupMessages(g.id);subscribeGroupMessages(g.id);
}

function openDM(contact){
  currentMode="dm";currentTarget=contact.email;
  $("channel-name").textContent="💬 "+(contact.name||contact.email);
  $("topbar-actions").style.display="flex";
  $("audio-call-btn").onclick=()=>startCall(contact,false);
  $("video-call-btn").onclick=()=>startCall(contact,true);
  buildAll();loadDMs(contact.email);subscribeDMs(contact.email);
}

// ══ MESSAGES ══
async function loadMessages(){
  $("messages").innerHTML=`<div class="loading">Chargement…</div>`;
  const{data}=await sb.from("messages").select("*").eq("channel",currentTarget).order("created_at",{ascending:true}).limit(100);
  renderMsgs(data||[]);
}

async function loadGroupMessages(gid){
  $("messages").innerHTML=`<div class="loading">Chargement…</div>`;
  const{data}=await sb.from("group_messages").select("*").eq("group_id",gid).order("created_at",{ascending:true}).limit(100);
  renderMsgs(data||[]);
}

async function loadDMs(contactEmail){
  $("messages").innerHTML=`<div class="loading">Chargement…</div>`;
  const myId=currentUser.id;
  const{data}=await sb.from("direct_messages").select("*")
    .or(`and(from_id.eq.${myId},to_email.eq.${contactEmail}),and(from_email.eq.${contactEmail},to_id.eq.${myId})`)
    .order("created_at",{ascending:true}).limit(100);
  renderMsgs(data||[],true);
}

function renderMsgs(msgs,isDm=false){
  const box=$("messages");box.innerHTML="";let lastUid=null;
  msgs.forEach(msg=>{
    const uid=isDm?msg.from_id:msg.user_id;
    const isMe=uid===currentUser.id;
    const showMeta=uid!==lastUid;lastUid=uid;
    const name=isDm?(isMe?"Vous":msg.from_name||msg.from_email):(msg.display_name||"Anonyme");
    appendMsgEl(box,msg.content,isMe,showMeta,name,msg.created_at);
  });
  $("messages-wrap").scrollTop=$("messages-wrap").scrollHeight;
}

function appendMsgEl(box,content,isMe,showMeta,name,ts){
  const wrap=document.createElement("div");
  wrap.className="msg-wrap "+(isMe?"me":"other");
  wrap.style.marginTop=showMeta?"12px":"2px";
  const av=showMeta&&!isMe?`<div class="avatar" style="background:${clr(name)};color:#0C0B12;width:30px;height:30px;font-size:10px">${ini(name)}</div>`:`<div style="width:30px;flex-shrink:0"></div>`;
  const meta=showMeta?`<div class="msg-meta">${isMe?"":esc(name)+" · "}${fmtTime(ts)}</div>`:"";
  const bubble=`<div class="bubble ${isMe?"bubble-me":"bubble-other"}">${esc(content)}</div>`;
  wrap.innerHTML=isMe?`<div class="msg-col" style="align-items:flex-end">${meta}${bubble}</div>`:`${av}<div class="msg-col">${meta}${bubble}</div>`;
  box.appendChild(wrap);
}

function appendNewMsg(msg,isDm=false){
  const uid=isDm?msg.from_id:msg.user_id;
  const isMe=uid===currentUser.id;
  const name=isDm?(isMe?"Vous":msg.from_name||msg.from_email):(msg.display_name||"Anonyme");
  appendMsgEl($("messages"),msg.content,isMe,true,name,msg.created_at);
  $("messages-wrap").scrollTop=$("messages-wrap").scrollHeight;
}

// ══ SUBSCRIPTIONS ══
function subscribeMessages(){
  if(realtimeSub)sb.removeChannel(realtimeSub);
  realtimeSub=sb.channel("ch-"+currentTarget)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:`channel=eq.${currentTarget}`},
      p=>{if(currentMode==="channel"&&currentTarget===p.new.channel)appendNewMsg(p.new);})
    .subscribe();
}

function subscribeGroupMessages(gid){
  if(realtimeSub)sb.removeChannel(realtimeSub);
  realtimeSub=sb.channel("grp-"+gid)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"group_messages",filter:`group_id=eq.${gid}`},
      p=>{if(currentMode==="group"&&currentTarget===gid)appendNewMsg(p.new);})
    .subscribe();
}

function subscribeDMs(contactEmail){
  if(realtimeSub)sb.removeChannel(realtimeSub);
  realtimeSub=sb.channel("dm-"+currentUser.id+"-"+contactEmail)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"direct_messages"},
      p=>{const m=p.new;const ok=(m.from_id===currentUser.id&&m.to_email===contactEmail)||(m.from_email===contactEmail&&m.to_id===currentUser.id);if(ok)appendNewMsg(m,true);})
    .subscribe();
}

// ══ SEND ══
async function sendMessage(){
  const text=$("msg-input").value.trim();
  if(!text||!currentUser)return;
  $("msg-input").value="";
  const name=currentUser.user_metadata?.name||currentUser.email.split("@")[0];
  if(currentMode==="channel"){
    await sb.from("messages").insert({channel:currentTarget,content:text,user_id:currentUser.id,display_name:name});
  } else if(currentMode==="group"){
    await sb.from("group_messages").insert({group_id:currentTarget,content:text,user_id:currentUser.id,display_name:name});
  } else if(currentMode==="dm"){
    await sb.from("direct_messages").insert({content:text,from_id:currentUser.id,from_email:currentUser.email,from_name:name,to_email:currentTarget,to_id:null});
  }
}

// ══ GROUPS ══
$("create-group-btn").onclick=()=>{
  // Populate members from contacts
  const ml=$("modal-members-list");ml.innerHTML="";
  if(!contacts.length){ml.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:8px">Ajoutez d'abord des contacts</div>`;}
  contacts.forEach(c=>{
    const el=document.createElement("div");
    el.className="modal-member";
    el.innerHTML=`<input type="checkbox" value="${esc(c.email)}" id="mc-${esc(c.email)}"/><label for="mc-${esc(c.email)}" style="font-size:13px;cursor:pointer">${esc(c.name||c.email)}</label>`;
    ml.appendChild(el);
  });
  $("group-name-input").value="";
  $("group-modal").classList.add("open");
};
$("group-modal-cancel").onclick=()=>$("group-modal").classList.remove("open");
$("group-modal-ok").onclick=()=>{
  const name=$("group-name-input").value.trim();
  if(!name)return;
  const checked=Array.from(document.querySelectorAll("#modal-members-list input:checked")).map(i=>i.value);
  const myEmail=currentUser.email;
  const members=[myEmail,...checked];
  const gid="g_"+Date.now();
  groups.push({id:gid,name,members,createdBy:currentUser.id});
  saveLocal();buildGroups();
  $("group-modal").classList.remove("open");
  // Switch to the new group
  openGroup(groups[groups.length-1]);
  // Switch to groupes tab
  document.querySelector('[data-panel="groupes"]').click();
};

// ══ CONTACTS ══
$("add-contact-btn").onclick=()=>{
  const email=$("contact-email-input").value.trim().toLowerCase();
  if(!email||!email.includes("@"))return;
  if(email===currentUser.email){alert("Vous ne pouvez pas vous ajouter !");return;}
  if(contacts.find(c=>c.email===email)){alert("Contact déjà ajouté !");return;}
  contacts.push({email,name:email.split("@")[0]});
  saveLocal();buildContacts();
  $("contact-email-input").value="";
};

// ══ CALLS (WebRTC) ══
const ICE={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};

async function startCall(contact,isVideo){
  isVideoCall=isVideo;showCallUI(contact.name||contact.email,isVideo);
  $("call-status").textContent="Appel en cours…";
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVideo});
    if(isVideo){$("local-video").srcObject=localStream;$("local-video").style.display="block";$("cam-btn").style.display="flex";}
    peerConn=new RTCPeerConnection(ICE);
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    peerConn.ontrack=e=>{$("remote-video").srcObject=e.streams[0];if(isVideo)$("remote-video").style.display="block";$("call-status").textContent="En communication";};
    peerConn.onicecandidate=async e=>{if(e.candidate)await sb.from("signaling").insert({from_email:currentUser.email,to_email:contact.email,type:"candidate",payload:JSON.stringify(e.candidate)});};
    const offer=await peerConn.createOffer();await peerConn.setLocalDescription(offer);
    const name=currentUser.user_metadata?.name||currentUser.email.split("@")[0];
    await sb.from("signaling").insert({from_email:currentUser.email,to_email:contact.email,type:"offer",payload:JSON.stringify(offer),caller_name:name,is_video:isVideo});
  }catch(e){alert("Micro/Caméra inaccessible : "+e.message);endCall();}
}

async function acceptCall(){
  $("incoming-call").style.display="none";
  const{offer,from,callerName,isVideo}=incomingOffer;
  isVideoCall=isVideo;showCallUI(callerName||from,isVideo);
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVideo});
    if(isVideo){$("local-video").srcObject=localStream;$("local-video").style.display="block";$("cam-btn").style.display="flex";}
    peerConn=new RTCPeerConnection(ICE);
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    peerConn.ontrack=e=>{$("remote-video").srcObject=e.streams[0];if(isVideo)$("remote-video").style.display="block";$("call-status").textContent="En communication";};
    peerConn.onicecandidate=async e=>{if(e.candidate)await sb.from("signaling").insert({from_email:currentUser.email,to_email:from,type:"candidate",payload:JSON.stringify(e.candidate)});};
    await peerConn.setRemoteDescription(new RTCSessionDescription(offer));
    const answer=await peerConn.createAnswer();await peerConn.setLocalDescription(answer);
    await sb.from("signaling").insert({from_email:currentUser.email,to_email:from,type:"answer",payload:JSON.stringify(answer)});
  }catch(e){alert("Micro/Caméra inaccessible : "+e.message);endCall();}
}

function endCall(){
  if(peerConn){peerConn.close();peerConn=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  $("call-overlay").style.display="none";
  $("remote-video").style.display=$("local-video").style.display="none";
  $("remote-video").srcObject=$("local-video").srcObject=null;
}

function showCallUI(name,isVideo){
  $("call-overlay").style.display="flex";
  $("call-contact-name").textContent=name;
  $("call-avatar").textContent=ini(name);
  $("call-avatar").style.background=clr(name);
  $("call-avatar").style.display=isVideo?"none":"flex";
}

function subscribeSignaling(){
  if(sigSub)sb.removeChannel(sigSub);
  sigSub=sb.channel("sig-"+currentUser.email)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"signaling",filter:`to_email=eq.${currentUser.email}`},
      async p=>{
        const sig=p.new;
        if(sig.type==="offer"){
          incomingOffer={offer:JSON.parse(sig.payload),from:sig.from_email,callerName:sig.caller_name,isVideo:sig.is_video};
          $("incoming-name").textContent=(sig.caller_name||sig.from_email)+(sig.is_video?" (vidéo)":" (audio)");
          $("incoming-call").style.display="block";
          setTimeout(()=>$("incoming-call").style.display="none",30000);
        } else if(sig.type==="answer"&&peerConn){
          await peerConn.setRemoteDescription(new RTCSessionDescription(JSON.parse(sig.payload)));
          $("call-status").textContent="En communication";
        } else if(sig.type==="candidate"&&peerConn){
          try{await peerConn.addIceCandidate(new RTCIceCandidate(JSON.parse(sig.payload)));}catch(e){}
        }
      })
    .subscribe();
}

// ══ AUTH ══
sb.auth.onAuthStateChange((event,session)=>{
  currentUser=session?.user||null;
  if(currentUser){
    $("auth-screen").style.display="none";$("app").style.display="block";
    const name=currentUser.user_metadata?.name||currentUser.email.split("@")[0];
    $("user-name-footer").textContent=name;
    $("user-initials-footer").innerHTML=ini(name)+`<div class="status-dot"></div>`;
    $("user-initials-footer").style.background=clr(name);
    loadLocal();buildAll();
    openChannel("general","général");
    subscribeSignaling();
  } else {
    $("auth-screen").style.display="flex";$("app").style.display="none";
  }
});

// ══ WIRE UI ══
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("tab-active"));
    btn.classList.add("tab-active");$("auth-error").textContent="";
    $("name-group").style.display=btn.dataset.tab==="register"?"flex":"none";
    $("auth-submit").textContent=btn.dataset.tab==="register"?"Créer mon compte":"Se connecter";
  };
});

$("auth-submit").onclick=async()=>{
  const mode=document.querySelector(".tab-active").dataset.tab;
  const email=$("auth-email").value.trim(),pass=$("auth-pass").value,name=$("auth-name").value.trim();
  $("auth-error").textContent="";$("auth-submit").textContent="Chargement…";
  let r;
  if(mode==="register")r=await sb.auth.signUp({email,password:pass,options:{data:{name:name||email.split("@")[0]}}});
  else r=await sb.auth.signInWithPassword({email,password:pass});
  if(r.error){
    const m={"Invalid login credentials":"Email ou mot de passe incorrect.","User already registered":"Email déjà utilisé."};
    $("auth-error").textContent=m[r.error.message]||r.error.message;
    $("auth-submit").textContent=mode==="register"?"Créer mon compte":"Se connecter";
  }
};

["auth-email","auth-pass","auth-name"].forEach(id=>$(id)?.addEventListener("keydown",e=>{if(e.key==="Enter")$("auth-submit").click();}));

document.querySelectorAll(".nav-tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".sidebar-panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");$("panel-"+tab.dataset.panel).classList.add("active");
  };
});

$("send-btn").onclick=sendMessage;
$("msg-input").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
$("signout-btn").onclick=()=>sb.auth.signOut();
$("menu-btn").onclick=()=>$("sidebar").classList.toggle("sidebar-hidden");
$("end-call-btn").onclick=endCall;
$("accept-call-btn").onclick=acceptCall;
$("decline-call-btn").onclick=()=>{$("incoming-call").style.display="none";incomingOffer=null;};
$("mute-btn").onclick=()=>{if(!localStream)return;isMuted=!isMuted;localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);$("mute-btn").textContent=isMuted?"🔇":"🎤";};
$("cam-btn").onclick=()=>{if(!localStream)return;const t=localStream.getVideoTracks()[0];if(t){t.enabled=!t.enabled;$("cam-btn").textContent=t.enabled?"📷":"🚫";}};
</script>
